name: Update Grain Bids

on:
  schedule:
    - cron: "0 13-23/2 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-bids:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas beautifulsoup4 playwright

      - name: Install Playwright browser and Linux dependencies
        run: |
          python -m playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run scraper
        run: |
          xvfb-run -a python all_bids_scraper.py

      - name: Show CSV preview
        run: |
          ls -l
          head -20 all_grain_bids.csv

      - name: Commit updated CSV
        run: |
          git config user.name "grainbidmap-bot"
          git config user.email "grainbidmap-bot@users.noreply.github.com"
          git add all_grain_bids.csv
          git commit -m "Update grain bids" || echo "No changes to commit"
          git push
