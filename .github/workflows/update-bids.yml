name: Update Grain Bids

on:
  schedule:
    - cron: "0 13-23/2 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-bids:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run scraper
        run: |
          xvfb-run python all_bids_scraper.py

      - name: Commit updated CSV
        run: |
          git config user.name "grainbidmap-bot"
          git config user.email "grainbidmap-bot@users.noreply.github.com"
          git add all_grain_bids.csv
          git commit -m "Update grain bids" || echo "No changes to commit"
          git push
